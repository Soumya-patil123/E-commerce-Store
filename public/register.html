<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create an account — Fieldstone Goods</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/index.html">
        <span class="mark">⛏</span> Fieldstone Goods
        <span class="tagline">Built to be used</span>
      </a>
      <nav class="main-nav" id="nav-account"></nav>
      <a class="cart-link" href="/cart.html">Cart <span class="cart-count" id="cart-count">0</span></a>
    </div>
  </header>

  <main>
    <div class="form-card">
      <h2>Create an account</h2>
      <div id="alert-slot"></div>
      <form id="register-form">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" minlength="6" required />
        </div>
        <button class="btn btn-primary btn-block" type="submit">Create account</button>
      </form>
      <p class="form-footer-link">Already have an account? <a href="/login.html">Sign in</a></p>
    </div>
  </main>

  <footer class="site-footer">Fieldstone Goods · a demo storefront built for learning purposes</footer>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
